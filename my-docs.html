<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#C4603A">
<title>My Documents — Mitti</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>म</text></svg>">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
:root{--clay:#C4603A;--earth:#3D2010;--bark:#6B3D1E;--cream:#FBF5EC;--warm:#F5E6CC;--saffron:#E89A3A;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--bark)}
nav{background:rgba(251,245,236,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(196,96,58,.12);padding:16px 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-mark{width:32px;height:32px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:14px;color:var(--cream);font-weight:700}
.nav-name{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--earth)}
.nav-name span{color:var(--clay)}
.page{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 57px)}
.sidebar{border-right:1px solid rgba(196,96,58,.12);background:white;overflow-y:auto;padding:20px 0}
.sidebar-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--bark);opacity:.5;padding:0 20px 12px;font-weight:500}
.doc-item{padding:14px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.doc-item:hover{background:var(--warm)}
.doc-item.active{background:rgba(196,96,58,.06);border-left-color:var(--clay)}
.doc-item-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.doc-icon{font-size:16px}
.doc-type-tag{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--saffron);font-weight:500}
.doc-project{font-size:13px;font-weight:500;color:var(--earth);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11px;color:var(--bark);opacity:.55}
.preview-area{padding:40px 5%;overflow-y:auto;max-height:calc(100vh - 57px);background:var(--cream)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;opacity:.5}
.empty-state-icon{font-size:48px;margin-bottom:16px}
.empty-state h2{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:8px}
.empty-state p{font-size:14px;font-weight:300;max-width:320px;line-height:1.6;margin-bottom:20px}
.doc-actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.action-btn{padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:6px}
.action-btn.primary{background:var(--clay);color:var(--cream)}
.action-btn.primary:hover{background:#8B3A1A}
.action-btn.secondary{background:transparent;color:var(--bark);border:1px solid rgba(196,96,58,.25)}
.action-btn.secondary:hover{border-color:var(--clay);color:var(--clay)}
/* Document preview styles */
.doc-preview-wrap{background:white;border-radius:12px;border:1px solid rgba(196,96,58,.12);box-shadow:0 4px 24px rgba(28,15,6,.06);overflow:hidden;padding:0}
.doc-header-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:2px solid var(--clay);background:var(--earth)}
.doc-brand{display:flex;align-items:center;gap:8px}
.doc-brand-mark{width:28px;height:28px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:12px;color:var(--cream);font-weight:700}
.doc-brand-name{font-size:13px;color:rgba(251,245,236,.8);font-weight:400}
.doc-type-badge{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--saffron);font-weight:500}
.doc-content{padding:36px;font-family:Georgia,serif;color:var(--earth);line-height:1.8}
.doc-content h1{font-size:26px;margin-bottom:20px;border-bottom:1px solid rgba(196,96,58,.2);padding-bottom:14px}
.doc-content h2{font-size:18px;margin:28px 0 10px;color:var(--soil)}
.doc-content h3{font-size:15px;margin:20px 0 8px;color:var(--bark)}
.doc-content p{margin-bottom:12px;font-size:14px}
.doc-content ul,.doc-content ol{padding-left:22px;margin-bottom:12px}
.doc-content li{font-size:14px;margin-bottom:4px}
.doc-content strong{font-weight:700;color:var(--earth)}
.doc-content em{font-style:italic;color:var(--soil)}
.doc-stamp{padding:16px 28px;text-align:center;font-size:11px;color:rgba(61,32,16,.35);border-top:1px solid rgba(196,96,58,.08)}
@media print{nav,.sidebar,.doc-actions{display:none!important}.page{grid-template-columns:1fr}.preview-area{padding:0;max-height:none}.doc-preview-wrap{box-shadow:none;border:none;border-radius:0}}
@media(max-width:768px){.page{grid-template-columns:1fr}.sidebar{max-height:200px;border-right:none;border-bottom:1px solid rgba(196,96,58,.12)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-mark">म</div>
    <span class="nav-name">Mitti<span>.</span></span>
  </a>
  <div style="display:flex;align-items:center;gap:12px">
    <a href="proposals.html" style="font-size:13px;color:var(--bark);text-decoration:none;padding:6px 14px;border-radius:100px;border:1px solid rgba(196,96,58,.2)">New document</a>
    <a href="invoice.html" style="font-size:13px;color:var(--bark);text-decoration:none;padding:6px 14px;border-radius:100px;border:1px solid rgba(196,96,58,.2)">Invoice</a>
    <a href="profile.html" style="font-size:13px;color:var(--bark);text-decoration:none;padding:6px 14px;border-radius:100px;border:1px solid rgba(196,96,58,.2)">👤 Profile</a>
  </div>
</nav>

<div class="page">
  <div class="sidebar">
    <div class="sidebar-title">Saved documents</div>
    <div id="doc-list"></div>
  </div>
  <div class="preview-area" id="preview-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">📂</div>
      <h2>No documents yet</h2>
      <p>Documents you generate in Mitti Proposals are automatically saved here in your browser.</p>
      <a href="proposals.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--clay);color:var(--cream);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;text-decoration:none">Generate your first document →</a>
    </div>
    <div id="doc-display" style="display:none">
      <div class="doc-actions" id="doc-actions"></div>
      <div class="doc-preview-wrap" id="doc-preview"></div>
    </div>
  </div>
</div>

<script>
const DOCS_HTML_KEY = 'mitti_docs_html';
const ICONS = { proposal:'📄', contract:'📋', nda:'🔒', sow:'📐', retainer:'🔁', followup:'✉️', invoice:'🧾' };
const LABELS = { proposal:'Proposal', contract:'Contract', nda:'NDA', sow:'SOW', retainer:'Retainer', followup:'Follow-up', invoice:'Invoice' };

function inr(n) { return '₹' + Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }

let docs = [];
let activeIdx = -1;

function loadDocs() {
  try { docs = JSON.parse(localStorage.getItem(DOCS_HTML_KEY) || '[]'); } catch { docs = []; }
}

function renderList() {
  const el = document.getElementById('doc-list');
  if (!docs.length) { el.innerHTML = '<div style="padding:20px;font-size:13px;color:var(--bark);opacity:.5;font-style:italic">Generate documents in Mitti Proposals to see them here.</div>'; return; }
  el.innerHTML = docs.map((d, i) => `
    <div class="doc-item${i === activeIdx ? ' active' : ''}" onclick="showDoc(${i})">
      <div class="doc-item-top">
        <span class="doc-icon">${ICONS[d.docType] || '📄'}</span>
        <span class="doc-type-tag">${LABELS[d.docType] || d.docType}</span>
      </div>
      <div class="doc-project">${d.project || 'Untitled'}</div>
      <div class="doc-meta">${d.client || ''} · ${d.date || ''} · ${d.value ? inr(d.value) : ''}</div>
    </div>
  `).join('');
}

function showDoc(idx) {
  activeIdx = idx;
  renderList();
  const doc = docs[idx];
  if (!doc) return;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('doc-display').style.display = 'block';

  // Render the saved HTML safely
  const typeLabel = LABELS[doc.docType] || 'Document';
  const fullHtml = `
    <div class="doc-header-bar">
      <div class="doc-brand">
        <div class="doc-brand-mark">म</div>
        <span class="doc-brand-name">Mitti Proposals</span>
      </div>
      <div class="doc-type-badge">${typeLabel}</div>
    </div>
    <div class="doc-content">
      ${doc.html}
    </div>
    <div class="doc-stamp">Generated by Mitti · mitti.in · Made in Bharat 🇮🇳 · Saved ${new Date(doc.savedAt).toLocaleDateString('en-IN')}</div>
  `;

  document.getElementById('doc-preview').innerHTML = DOMPurify.sanitize(fullHtml, {
    ALLOWED_TAGS: ['div','span','table','tr','td','h1','h2','h3','p','ul','ol','li','strong','em','br'],
    ALLOWED_ATTR: ['class','style'],
  });

  // Action buttons
  const actionsEl = document.getElementById('doc-actions');
  actionsEl.innerHTML = '';

  const printBtn = document.createElement('button');
  printBtn.className = 'action-btn primary';
  printBtn.textContent = '🖨️ Print / Save PDF';
  printBtn.onclick = () => window.print();

  const copyBtn = document.createElement('button');
  copyBtn.className = 'action-btn secondary';
  copyBtn.textContent = '📋 Copy text';
  copyBtn.onclick = () => {
    const text = document.getElementById('doc-preview').innerText;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => { copyBtn.textContent = '✓ Copied!'; setTimeout(() => copyBtn.textContent = '📋 Copy text', 2000); });
    }
  };

  const regenBtn = document.createElement('a');
  regenBtn.className = 'action-btn secondary';
  regenBtn.textContent = '✨ Regenerate';
  regenBtn.href = doc.docType === 'invoice' ? 'invoice.html' : `proposals.html?doctype=${doc.docType}`;

  const delBtn = document.createElement('button');
  delBtn.className = 'action-btn secondary';
  delBtn.textContent = '🗑️ Delete';
  delBtn.style.color = '#e74c3c';
  delBtn.onclick = () => {
    if (!confirm('Delete this document?')) return;
    docs.splice(idx, 1);
    localStorage.setItem(DOCS_HTML_KEY, JSON.stringify(docs));
    activeIdx = -1;
    renderList();
    document.getElementById('empty-state').style.display = '';
    document.getElementById('doc-display').style.display = 'none';
  };

  actionsEl.append(printBtn, copyBtn, regenBtn, delBtn);
  document.getElementById('preview-area').scrollTop = 0;
}

// Init
loadDocs();
renderList();
if (docs.length > 0) showDoc(0);
</script>
</body>
</html>
