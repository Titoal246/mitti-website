<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1C0F06"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%">
      <stop offset="0%" stop-color="#3D2010" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1C0F06"/>
    </radialGradient>
  </defs>
  <!-- Brand mark -->
  <circle cx="140" cy="120" r="52" fill="#C4603A"/>
  <text x="140" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#FBF5EC" font-weight="700">म</text>
  <!-- Brand name -->
  <text x="210" y="135" font-family="Georgia, serif" font-size="52" fill="#FBF5EC" font-weight="400">Mitti</text>
  <text x="324" y="135" font-family="Georgia, serif" font-size="52" fill="#C4603A">.</text>
