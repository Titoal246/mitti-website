<!DOCTYPE html>

<head>

<title>Page Not Found — Mitti</title>

<style>
:root{--clay:#C4603A;--earth:#3D2010;--cream:#FBF5EC;--saffron:#E89A3A;--serif:'Georgia',serif;--sans:system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--earth);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 5%}
.mark{width:72px;height:72px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:32px;color:var(--cream);font-weight:700;margin:0 auto 32px}
h1{font-family:var(--serif);font-size:48px;font-weight:400;margin-bottom:16px;color:var(--cream)}
h1 em{color:var(--saffron);font-style:italic}
p{font-size:16px;color:rgba(251,245,236,.6);margin-bottom:40px;max-width:420px;line-height:1.7;font-weight:300}
.links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
a{padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;text-decoration:none;transition:all .2s}
.primary{background:var(--clay);color:var(--cream)}
.primary:hover{background:#8B3A1A}
.secondary{border:1px solid rgba(251,245,236,.2);color:var(--cream)}
.secondary:hover{border-color:var(--clay);color:var(--saffron)}
</style>
</head>
<body>
  <div class="mark">म</div>
  <h1>Page not <em>found.</em></h1>
  <p>This page doesn't exist or may have moved. The good stuff is still here though.</p>

    <a href="/templates/index.html" class="secondary">Free Templates</a>
    <a href="/guide-invoice-india.html" class="secondary">GST Invoice Guide</a>
  </div>
</body>
</html>
